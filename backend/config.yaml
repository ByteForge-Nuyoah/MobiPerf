app:
  name: "MobiPerf"
  version: "1.0.0"
  debug: false
  host: "0.0.0.0"
  port: 8000

database:
  host: "localhost"
  port: 53306
  user: "root"
  password: "VCVuQ9W8Pov8"
  name: "mobiperf"
  charset: "utf8mb4"
  pool_size: 10
  max_overflow: 20
  autocommit: true

redis:
  enabled: true
  host: "localhost"
  port: 56379
  password: ""
  db: 0
  prefix: "mobiperf:"
  pool_size: 10

logging:
  level: "INFO"
  format: "json"
  file:
    enabled: true
    path: "logs"
    max_size: "10MB"
    retention: "30 days"
  console:
    enabled: true
    colorize: true

cache:
  enabled: true
  backend: "redis"
  default_ttl: 60
  keys:
    devices:
      key: "devices:list"
      ttl: 10
    apps:
      key: "apps:{serial}"
      ttl: 30
    device_info:
      key: "device:info:{serial}"
      ttl: 60

rate_limit:
  enabled: true
  backend: "redis"
  default:
    requests: 100
    window: 60
  endpoints:
    auth:
      login:
        requests: 10
        window: 60
      register:
        requests: 5
        window: 3600
    devices:
      list:
        requests: 60
        window: 60
    apps:
      list:
        requests: 30
        window: 60
    monitor:
      websocket:
        requests: 1000
        window: 60

security:
  secret_key: "your-secret-key-here"
  access_token_expire: 3600
  refresh_token_expire: 604800
  algorithm: "HS256"

performance:
  analysis_interval: 1
  max_metrics_per_session: 10000
  screenshot_dir: "static/screenshots"
  record_dir: "static/records"
  report_dir: "reports"
